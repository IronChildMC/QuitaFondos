<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RemoveBG Personal</title>

<style>
body{
    font-family: Arial, sans-serif;
    background:#111;
    color:white;
    text-align:center;
    padding:20px;
}

h1{
    color:#4CAF50;
}

input, button{
    margin:10px;
    padding:10px 20px;
    border:none;
    border-radius:8px;
}

button{
    background:#4CAF50;
    color:white;
    cursor:pointer;
}

button:hover{
    opacity:0.9;
}

#preview{
    max-width:80%;
    margin-top:20px;
    display:none;
    border:2px solid #444;
    border-radius:10px;
}

#downloadBtn{
    display:none;
}
</style>
</head>
<body>

<h1>Quitar Fondo con RemoveBG</h1>

<input type="file" id="imageInput" accept="image/*">
<br>

<button onclick="removeBackground()">Quitar Fondo</button>

<br>

<img id="preview">

<br>

<button id="downloadBtn">Descargar PNG</button>

<script>
const API_KEY = "4ySermGsysYPcxx2pcRQ48aJ";

let resultBlob = null;

async function removeBackground() {
    const file = document.getElementById("imageInput").files[0];

    if (!file) {
        alert("Selecciona una imagen.");
        return;
    }

    const formData = new FormData();
    formData.append("image_file", file);
    formData.append("size", "auto");

    try {
        const response = await fetch(
            "https://api.remove.bg/v1.0/removebg",
            {
                method: "POST",
                headers: {
                    "X-Api-Key": API_KEY
                },
                body: formData
            }
        );

        if (!response.ok) {
            const errorText = await response.text();
            throw new Error(errorText);
        }

        resultBlob = await response.blob();

        const imageURL = URL.createObjectURL(resultBlob);

        const preview = document.getElementById("preview");
        preview.src = imageURL;
        preview.style.display = "block";

        const downloadBtn = document.getElementById("downloadBtn");
        downloadBtn.style.display = "inline-block";

        downloadBtn.onclick = () => {
            const a = document.createElement("a");
            a.href = imageURL;
            a.download = "sin_fondo.png";
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
        };

    } catch (error) {
        console.error(error);
        alert("Error:\n" + error.message);
    }
}
</script>

</body>
</html>
