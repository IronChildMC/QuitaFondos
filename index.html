<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Eliminar Fondo</title>

<style>
    *{
        box-sizing:border-box;
        font-family:Arial, sans-serif;
    }

    body{
        margin:0;
        min-height:100vh;
        background:#111827;
        color:white;
        display:flex;
        justify-content:center;
        align-items:center;
        padding:20px;
    }

    .container{
        width:100%;
        max-width:900px;
        background:#1f2937;
        border-radius:20px;
        padding:25px;
        box-shadow:0 0 30px rgba(0,0,0,0.4);
    }

    h1{
        text-align:center;
        margin-bottom:20px;
        color:#60a5fa;
    }

    .upload{
        border:3px dashed #3b82f6;
        border-radius:20px;
        padding:40px;
        text-align:center;
        cursor:pointer;
        transition:0.2s;
    }

    .upload:hover{
        background:#263244;
    }

    input{
        display:none;
    }

    .preview-container{
        margin-top:25px;
        display:grid;
        grid-template-columns:1fr 1fr;
        gap:20px;
    }

    .box{
        background:#111827;
        border-radius:15px;
        padding:15px;
        text-align:center;
    }

    .box h2{
        margin-top:0;
        color:#93c5fd;
    }

    img{
        max-width:100%;
        border-radius:10px;
        background-image:
        linear-gradient(45deg,#444 25%,transparent 25%),
        linear-gradient(-45deg,#444 25%,transparent 25%),
        linear-gradient(45deg,transparent 75%,#444 75%),
        linear-gradient(-45deg,transparent 75%,#444 75%);
        background-size:20px 20px;
        background-position:0 0,0 10px,10px -10px,-10px 0px;
    }

    button{
        margin-top:20px;
        padding:12px 20px;
        border:none;
        border-radius:12px;
        background:#2563eb;
        color:white;
        font-size:16px;
        cursor:pointer;
        transition:0.2s;
    }

    button:hover{
        background:#1d4ed8;
    }

    .status{
        margin-top:15px;
        text-align:center;
        color:#93c5fd;
    }

    @media(max-width:700px){
        .preview-container{
            grid-template-columns:1fr;
        }
    }
</style>
</head>

<body>

<div class="container">
    <h1>🪄 Eliminador de Fondo</h1>

    <label class="upload">
        <input type="file" id="fileInput" accept="image/*">
        <div>
            <h2>Haz click para subir una imagen</h2>
            <p>PNG, JPG, WEBP...</p>
        </div>
    </label>

    <div class="status" id="status"></div>

    <div class="preview-container">
        <div class="box">
            <h2>Imagen Original</h2>
            <img id="originalImage">
        </div>

        <div class="box">
            <h2>Sin Fondo</h2>
            <img id="resultImage">
            <br>
            <button id="downloadBtn" style="display:none;">
                Descargar PNG
            </button>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@imgly/background-removal/dist/browser.js"></script>

<script>
const fileInput = document.getElementById("fileInput");
const originalImage = document.getElementById("originalImage");
const resultImage = document.getElementById("resultImage");
const statusText = document.getElementById("status");
const downloadBtn = document.getElementById("downloadBtn");

let outputBlob = null;

fileInput.addEventListener("change", async (e) => {
    const file = e.target.files[0];
    if (!file) return;

    const url = URL.createObjectURL(file);
    originalImage.src = url;

    statusText.textContent = "Eliminando fondo...";

    try{
        const blob = await removeBackground(file);

        outputBlob = blob;

        const resultURL = URL.createObjectURL(blob);
        resultImage.src = resultURL;

        statusText.textContent = "¡Fondo eliminado!";
        downloadBtn.style.display = "inline-block";

    }catch(err){
        console.error(err);
        statusText.textContent = "Error eliminando el fondo.";
    }
});

downloadBtn.addEventListener("click", () => {
    if(!outputBlob) return;

    const a = document.createElement("a");
    a.href = URL.createObjectURL(outputBlob);
    a.download = "sin_fondo.png";
    a.click();
});
</script>

</body>
</html>
