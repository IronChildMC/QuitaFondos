<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Quitar fondo</title>
</head>

<body>
<input type="file" id="file">

<br><br>

<img id="original" width="200">
<img id="result" width="200">

<p id="status"></p>

<script type="module">
import { removeBackground } from "https://cdn.jsdelivr.net/npm/@imgly/background-removal@1.5.5/+esm";

const fileInput = document.getElementById("file");
const original = document.getElementById("original");
const result = document.getElementById("result");
const status = document.getElementById("status");

fileInput.addEventListener("change", async (e) => {
    const file = e.target.files[0];
    if (!file) return;

    original.src = URL.createObjectURL(file);
    status.textContent = "Procesando...";

    try {
        const blob = await removeBackground(file);
        result.src = URL.createObjectURL(blob);
        status.textContent = "Listo";
    } catch (err) {
        console.error(err);
        status.textContent = "Error procesando imagen";
    }
});
</script>

</body>
</html>
