<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>RemoveBG Tool</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="panel">

    <h1>🧼 Quitar fondo de imágenes</h1>

    <label class="upload">
        <p><b>Haz click para subir una imagen</b></p>
        <input type="file" id="imageInput" accept="image/*">
    </label>

    <button onclick="removeBackground()">Procesar imagen</button>

    <div class="progress" id="progress">
        <div class="bar" id="bar"></div>
    </div>

    <div class="estado" id="estado">Esperando imagen...</div>

    <img id="preview">

    <button id="downloadBtn">Descargar imagen</button>

</div>

<audio id="soundUpload">
    <source src="https://actions.google.com/sounds/v1/cartoon/pop.ogg">
</audio>

<audio id="soundDone">
    <source src="https://actions.google.com/sounds/v1/cartoon/concussive_hit_guitar_boing.ogg">
</audio>

<script src="script.js"></script>
</body>
</html>
